<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Memory</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=DM+Sans&display=swap" rel="stylesheet">
  <style>
    .card {
      background: #110E09;
      border: 0.5px solid #2A2219;
      border-radius: 12px;
      padding: 36px 28px;
      width: min(420px, 90vw);
      animation: fadeUp 0.8s ease both;
    }
    .card h2 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 26px;
      color: #F0EAD6;
      margin-bottom: 8px;
      text-align: left;
    }
    .card p {
      font-size: 13px;
      color: #8A7A68;
      line-height: 1.7;
      margin-bottom: 28px;
      text-align: left;
    }
    label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #8A7A68;
      margin-bottom: 8px;
    }
    input[type="text"] {
      width: 100%;
      background: #0A0806;
      border: 1px solid #2A2219;
      border-radius: 6px;
      padding: 14px 16px;
      color: #F0EAD6;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.3s;
      margin-bottom: 20px;
    }
    input[type="text"]:focus { border-color: #E8A94A; }
    .btn {
      width: 100%;
      background: transparent;
      border: 1px solid #E8A94A;
      border-radius: 6px;
      padding: 14px;
      color: #E8A94A;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn:hover { background: rgba(232,169,74,0.1); }
  </style>
</head>
<body>
  <div class="card">
    <p class="overline">Before we begin</p>
    <h2>Tell us about your memory.</h2>
    <p>One word is enough. Something from what you wrote on the postcard.</p>
    <label for="uname">Your name</label>
    <input type="text" id="uname" placeholder="e.g. Mahi" maxlength="20">
    <label for="word">One word from your memory</label>
    <input type="text" id="word" placeholder="e.g. beach, amma, monsoon..." maxlength="20">
    <button class="btn" onclick="go()">Hold this memory →</button>
  </div>
  <script>
    function go() {
      const n = document.getElementById('uname').value.trim() || 'You';
      const w = document.getElementById('word').value.trim() || 'memory';
      window.location.href = 'memory.html?name=' + encodeURIComponent(n) + '&word=' + encodeURIComponent(w);
    }
    document.addEventListener('keydown', e => { if(e.key==='Enter') go(); });
  </script>
</body>
</html>
